apiVersion: batch/v1
kind: CronJob
metadata:
  name: minute-backup
  namespace: nginx  # if you want to specify namespace
spec:
  schedule: "*/1 * * * *"  # every minute
  jobTemplate:
    spec:
      template:
        metadata:
          labels:
            app: minute-backup
        spec:
          containers:
          - name: backup-container
            image: busybox:latest
            command:
            - /bin/sh
            - -c
            - |
              echo "Backup Started"
              mkdir -p /backups
              mkdir -p /demo-data
              cp -r /demo-data/* /backups/ 2>/dev/null || true
              echo "Backup Completed"
            volumeMounts:
            - name: data-volume
              mountPath: /demo-data
            - name: backup-volume
              mountPath: /backups
          restartPolicy: OnFailure
          volumes:
          - name: data-volume
            hostPath:
              path: /demo-data
              type: DirectoryOrCreate
          - name: backup-volume
            hostPath:
              path: /backups
              type: DirectoryOrCreate
